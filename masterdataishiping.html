<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Master Data i-shipping</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <!-- Modal PIN -->
  <div id="pinModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white p-6 rounded-2xl shadow-xl w-80 text-center">
      <h2 class="text-xl font-bold text-indigo-700 mb-4">Masukkan PIN</h2>
      <input id="pinInput" type="password" maxlength="6" placeholder="******"
             class="w-full border p-2 rounded-xl text-center tracking-widest text-lg"/>
      <p id="pinError" class="text-red-500 text-sm mt-2 hidden">PIN salah, coba lagi!</p>
      <button id="pinSubmit" class="mt-4 w-full bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl">
        Masuk
      </button>
    </div>
  </div>

  <!-- Konten Halaman -->
  <div id="pageContent" class="hidden">
    <div class="max-w-8xl mx-auto bg-white p-6 rounded-2xl shadow-xl">
      <div class="flex flex-col md:flex-row md:justify-between md:items-center mb-6 space-y-4 md:space-y-0">
        <h1 class="text-3xl font-bold text-indigo-700">Master Data Pengiriman</h1>
        <div class="space-x-2">
          <a href="https://oprsesgs.pages.dev/dashboard" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-4 py-2 rounded-xl">Dashboard</a>
          <button id="downloadBtn" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-xl">Download Excel</button>
        </div>
      </div>

      <div class="overflow-x-auto">
        <table class="min-w-full table-auto border border-gray-300 text-sm" id="rekapTable">
          <thead class="bg-indigo-600 text-white">
            <tr>
              <th>No</th>
              <th>Timestamp</th>
              <th>Nama PT</th>
              <th>Driver</th>
              <th>Pangkalan</th>
              <th>Jumlah</th>
              <th>Retur</th>
              <th>Bright Gas</th>
              <th>Pemilik</th>
              <th>Foto</th>
              <th>Bukti</th>
              <th>Retur Foto</th>
              <th>Lokasi</th>
              <th>IP Address</th> <!-- TAMBAHAN -->
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="rekapBody"></tbody>
        </table>
      </div>
    </div>
  </div>

<script src="config.js"></script>
<script>
const GET_URL = API_ENDPOINT + '?action=transaksi';
const POST_URL = API_ENDPOINT;

let allData = [];

function renderRow(r, idx) {
  return `
    <tr>
      <td>${r.__row}</td>
      <td>${r.timestamp}</td>
      <td>${r.pos}</td>
      <td>${r.nama}</td>
      <td>${r.uraian}</td>
      <td>${r.nominal}</td>
      <td>${r.retur}</td>
      <td>${r.brightgas}</td>
      <td>${r.pembayaran}</td>
      <td>${r.foto}</td>
      <td>${r.buktitransfer}</td>
      <td>${r.buktiretur}</td>
      <td>${r.lokasi ? `<a href="${r.lokasi}" target="_blank">📍</a>` : '-'}</td>
      <td>${r.ip || '-'}</td> <!-- TAMBAHAN -->
      <td>-</td>
    </tr>
  `;
}

async function fetchData(){
  const res = await fetch(GET_URL);
  const data = await res.json();
  data.forEach((d,i)=>d.__row=i+2);
  allData = data;
  document.getElementById('rekapBody').innerHTML = data.map(renderRow).join('');
}

document.getElementById('downloadBtn').addEventListener('click',()=>{
  const header = ['Timestamp','PT','Driver','Pangkalan','Jumlah','Retur','Bright','Pemilik','Foto','Bukti','ReturFoto','Lokasi','IP']; // TAMBAHAN
  const rows = allData.map(r=>[
    r.timestamp,
    r.pos,
    r.nama,
    r.uraian,
    r.nominal,
    r.retur,
    r.brightgas,
    r.pembayaran,
    r.foto,
    r.buktitransfer,
    r.buktiretur,
    r.lokasi,
    r.ip // TAMBAHAN
  ]);

  const csv = [header,...rows].map(e=>e.join(",")).join("\n");
  const blob = new Blob([csv],{type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url;
  a.download="data.csv";
  a.click();
});

fetchData();
</script>
</body>
</html>
